<script>
const API = (window.location.origin && window.location.origin !== 'null' && window.location.protocol !== 'file:')
    ? window.location.origin
    : 'http://localhost:8000';

let user = { name: '', email: '', login_id: '' };
let recDraftProducts = [];
let delDraftProducts = [];
let editReceiptId = null;
let editDeliveryId = null;
let refreshTimer = null;

function api(path, opts = {}) {
    const url = path.startsWith('/api') ? path : '/api/' + path.replace(/^\/+/, '');
    return fetch(API + url, {
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts
    });
}

function toast(msg, type='info'){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className =
        'fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-lg text-sm font-medium shadow-lg z-50 toast ' +
        (type === 'err' ? 'bg-red-600' : 'bg-slate-800') + ' text-white';

    el.style.opacity='1';
    setTimeout(()=>{el.style.opacity='0';},3000);
}

function showLogin(){
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
}

function showSignup(){
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.remove('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
}

function showForgotPassword(){
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.remove('hidden');
    document.getElementById('otpStep2').classList.add('hidden');
}

async function handleLogin(){
    const loginId = document.getElementById('loginId').value.trim();
    const password = document.getElementById('loginPass').value;

    if(!loginId || !password){
        toast('Login Id and Password required','err');
        return;
    }

    try{
        const res = await api('/api/login',{
            method:'POST',
            body:JSON.stringify({login_id:loginId,password})
        });

        const data = await res.json();

        if(!res.ok) throw new Error(data.detail || 'Invalid credentials');

        user = {
            name:data.user_name,
            email:data.user_email,
            login_id:data.login_id
        };

        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');

        const badge = document.getElementById('userBadge');
        badge.textContent = (user.name || user.login_id || 'U')[0].toUpperCase();

        document.getElementById('recResp').placeholder = user.name || user.login_id;
        document.getElementById('delResp').placeholder = user.name || user.login_id;

        refreshAll();

        if(refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(refreshAll,5000);

    }catch(e){
        toast(e.message,'err');
    }
}

function handleSignOut(){
    if(refreshTimer){
        clearInterval(refreshTimer);
        refreshTimer = null;
    }

    user = {name:'',email:'',login_id:''};

    document.getElementById('appSection').classList.add('hidden');
    document.getElementById('authSection').classList.remove('hidden');

    showLogin();
}

function safeInt(v){
    const n = parseInt(v);
    return isNaN(n) ? 0 : n;
}

function safeFloat(v){
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
}

async function doTransfer(){

    const pid = document.getElementById('trProduct').value;
    const qty = safeInt(document.getElementById('trQty').value);
    const from = document.getElementById('trFrom').value;
    const to = document.getElementById('trTo').value;

    if(!pid || qty<=0 || !from || !to){
        toast('Fill all fields','err');
        return;
    }

    if(from===to){
        toast('From and To must be different','err');
        return;
    }

    try{

        const res = await api('/api/transfers',{
            method:'POST',
            body:JSON.stringify({
                product_id:pid,
                from_location:from,
                to_location:to,
                qty:qty
            })
        });

        if(!res.ok){
            const e = await res.json();
            throw new Error(e.detail);
        }

        toast('Transfer completed');

        document.getElementById('trQty').value='';

        refreshAll();

    }catch(e){
        toast(e.message,'err');
    }
}

async function doAdjustment(){

    const pid = document.getElementById('adjProduct').value;
    const loc = document.getElementById('adjLocation').value;
    const qty = safeInt(document.getElementById('adjQty').value);
    const reason = document.getElementById('adjReason').value.trim();

    if(!pid || qty===0){
        toast('Enter valid qty change','err');
        return;
    }

    try{

        const res = await api('/api/adjustments',{
            method:'POST',
            body:JSON.stringify({
                product_id:pid,
                location:loc,
                qty_change:qty,
                reason:reason
            })
        });

        if(!res.ok){
            const e = await res.json();
            throw new Error(e.detail);
        }

        toast('Adjustment applied');

        document.getElementById('adjQty').value='';
        document.getElementById('adjReason').value='';

        refreshAll();

    }catch(e){
        toast(e.message,'err');
    }
}
</script>
